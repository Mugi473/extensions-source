name: CI

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 80
  IS_PR_CHECK: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: gen
        run: |
          python ./.github/scripts/generate-build-matrices.py \
            4b825dc642cb6eb9a060e54bf8d69288fbee4904 Release

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ matrix.chunk.number > 1 }}
      - run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > signingkey.jks
      - env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew $MODULES
      - uses: actions/upload-artifact@v4
        with:
          name: individual-apks-${{ matrix.chunk.number }}
          path: '**/*.apk'
          retention-days: 1
      - run: rm -f signingkey.jks

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ~/apk-artifacts
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main
          persist-credentials: false
      - name: Build repo artifacts
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: |
          cd main
          python ./.github/scripts/move-built-apks.py
          INSPECTOR_LINK="$(curl -s https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py
          python -c "import json; d=json.load(open('repo/index.min.json')); json.dump(d, open('repo/index.json','w'), indent=2, ensure_ascii=False)"

          # Generate repo.json for Mihon (requires signing key fingerprint)
          echo "$SIGNING_KEY" | base64 -d > signingkey.jks
          FINGERPRINT="$(keytool -list -keystore signingkey.jks -storepass "$KEY_STORE_PASSWORD" -alias "$ALIAS" -rfc | openssl x509 -outform DER | sha256sum | awk '{print $1}')"
          rm -f signingkey.jks
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          python -c "import json; json.dump({'meta': {'name': '$OWNER extensions', 'website': 'https://github.com/$GITHUB_REPOSITORY', 'signingKeyFingerprint': '$FINGERPRINT'}}, open('repo/repo.json','w'), indent=2)"
          cat repo/repo.json
      - name: Force-push to repo branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd main/repo
          git init -q -b repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -q -m "Update extensions repo"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo:repo
